<html lang="en">
<head>

<title>Amorcillo, Lelis, Villacino</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@1,500&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        height: 100vh;
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: 'Montserrat', sans-serif;
        overflow: hidden;
        /* A slightly different, deeper gradient */
        background: linear-gradient(-45deg, #1A2980, #26D0CE, #ff6a00, #ee0979);
        background-size: 400% 400%;
        animation: gradientBG 15s ease infinite;
    }

    @keyframes gradientBG {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    .glass-container {
        background: rgba(255, 255, 255, 0.1);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        padding: 4rem;
        text-align: center;
        color: white;
        max-width: 600px; /* Slightly wider for names */
        width: 90%;
    }

    .team-header {
        font-size: 1rem;
        text-transform: uppercase;
        letter-spacing: 3px;
        opacity: 0.8;
        margin-bottom: 1.5rem;
    }

    .names-display {
        font-family: 'Lora', serif;
        font-size: 2.5rem; /* Large size for visibility */
        font-weight: 500;
        font-style: italic;
        line-height: 1.4;
        margin-bottom: 2rem;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }

    /* Animation classes */
    .anim-element {
        opacity: 0;
        transform: translateY(20px);
        animation: slideUpFade 0.8s ease-out forwards;
    }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }

    @keyframes slideUpFade {
        to { opacity: 1; transform: translateY(0); }
    }
</style>
</head>
