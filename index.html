<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amorcillo, Lelis, Villacino</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@1,500&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

<style>
    /* 1. RESET */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* 2. BODY STYLES (Your Background) */
    body {
        height: 100vh;
        width: 100%;
        display: flex;
        justify-content: center; /* Centers content horizontally */
        align-items: center;     /* Centers content vertically */
        font-family: 'Montserrat', sans-serif;
        overflow: hidden;
        background: linear-gradient(-45deg, #1A2980, #26D0CE, #ff6a00, #ee0979);
        background-size: 400% 400%;
        animation: gradientBG 15s ease infinite;
        position: relative; /* Needed for the absolute navbar */
    }

    @keyframes gradientBG {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    /* 3. NAVBAR STYLES (Added) */
    .navbar {
        position: absolute; /* Takes it out of the flex flow */
        top: 0;
        left: 0;
        width: 100%;
        padding: 20px 50px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 10; /* Ensures it sits on top */
    }

    .logo {
        color: white;
        font-weight: 700;
        font-size: 1.5rem;
        letter-spacing: 1px;
    }

    .nav-links {
        list-style: none;
        display: flex;
        gap: 40px; /* Space between links */
    }

    .nav-links a {
        text-decoration: none;
        color: rgba(255, 255, 255, 0.8);
        font-weight: 600;
        font-size: 0.9rem;
        transition: 0.3s;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .nav-links a:hover {
        color: white;
        text-shadow: 0 0 10px rgba(255,255,255,0.6);
    }
</style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">ALV GROUP</div>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Projects</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <div style="color: white; text-align: center;">
        <h1 style="font-family: 'Lora', serif; font-size: 3rem;">Welcome</h1>
    </div>

</body>
</html>
